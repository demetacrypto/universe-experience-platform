# Local / single-node deployment of the Universe Experience Platform.
#   docker compose up --build      → http://localhost:8000
services:
  uep:
    build: .
    image: universe-experience-platform:latest
    ports:
      - "8000:8000"
    environment:
      # "live" requires every archive; "prefer-live" permits labelled fallbacks.
      UEP_INGEST: "sample"
    restart: unless-stopped
